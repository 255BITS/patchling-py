site_name: Patchling
docs_dir: docs
site_dir: site
strict: true

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  features:
    - content.code.annotate
  palette:
    scheme: slate
    primary: deep purple
    accent: blue

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Installation: installation.md
  - API Reference: api.md
  - CLI Reference: cli.md
  - patchling-apply: patchling-apply.md
  - Agent Loops: examples/automation.md
  - Core Concepts: concepts.md
  - Architecture: concepts/architecture.md
  - Examples:
      - Basic Usage: examples/basic.md
      - Advanced Refactoring: examples/advanced.md
  - Development:
      - Testing Practices: development/testing.md
      - Contributing Guide: development/contributing.md
  - Troubleshooting: troubleshooting.md
extra:
  cname: patchling.255labs.xyz
  social:
    - name: nanoodle.com
      icon: fontawesome/solid/diagram-project
      link: https://nanoodle.com
    - name: patchling
      icon: fontawesome/brands/js
      link: https://github.com/255BITS/patchling
    - name: 255labs.xyz
      icon: fontawesome/solid/globe
      link: https://255labs.xyz
plugins:
